interface:
  display_name: "CodeRoblox"
  short_description: "Coordinate Roblox Studio through the CodeRoblox runtime and plugin without switching away from the user's real project workspace"
  default_prompt: "Use the CodeRoblox workflow: the external AI does the planning, the local agent runtime provides Studio context plus a local git-friendly mirror plus validation and queueing, and the plugin handles review plus execution. Keep the user's actual project workspace as the primary working directory unless the task explicitly is to modify the CodeRoblox runtime repo itself. Use CODEROBLOX_ROOT only for runtime management tasks, and start the Roblox bridge runtime directly with Python from scripts/run_agent.py instead of using make to launch it. Prefer absolute-path runtime commands instead of changing the main working directory. Sync Studio context first, read the latest snapshot, scripts, mirror, and output before planning, prefer the local mirror for file inspection when available, queue structured operations with patch preconditions, and assume the default mode is auto_apply_safe so only high-risk work should need plugin approval."
